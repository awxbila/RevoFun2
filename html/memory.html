<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Card - RevoFun</title>
    <link rel="stylesheet" href="../css/memory.css" />
  </head>
  <body>
    <main class="memory-shell">
      <section class="memory-board">
        <div class="memory-topbar">
          <span>MEMORY GAME</span>
          <span id="levelText">LEVEL: 1</span>
          <a href="../html/index.html" class="btn secondary-btn top-home-btn">Back to Home</a>
        </div>

        <div class="memory-stage">
          <p id="statusText">Cocokkan semua pasangan kartu tanpa salah tebakan.</p>

          <div class="lives" id="lives" aria-label="Nyawa">
            <span class="life">❤</span>
            <span class="life">❤</span>
            <span class="life">❤</span>
          </div>

          <div class="controls">
            <button id="startBtn" type="button">Start Game</button>
          </div>

          <div class="grid" id="grid" aria-live="polite"></div>
          <h2 id="congrats"></h2>
        </div>
      </section>
    </main>

    <script src="../js/memory.js"></script>
  </body>
</html>
